<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Security | User Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            background-size: cover; background-position: center;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: transparent;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .portal-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }
        .nav-pills .nav-link {
            border-radius: 14px;
            color: #475569;
            font-weight: 600;
            padding: 12px;
            transition: all 0.3s;
        }
        .nav-pills .nav-link.active {
            background: #4f46e5;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }
        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            border: 4px solid white;
        }
        .form-control, .form-select {
            border-radius: 14px;
            padding: 14px;
            border: 1px solid #cbd5e1;
            background: rgba(255,255,255,0.9);
        }
        .btn-submit {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            color: white; border: none; border-radius: 16px;
            padding: 16px; font-weight: 700; width: 100%;
            margin-top: 20px; transition: transform 0.2s;
        }
        .btn-submit:active { transform: scale(0.98); }
        .preview-img {
            width: 80px; height: 80px; object-fit: cover;
            border-radius: 12px; border: 2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="bg-canvas"></div>
    <div class="portal-card">
        <ul class="nav nav-pills nav-fill mb-4" id="portalTabs">
            <li class="nav-item">
                <button class="nav-link active" onclick="switchTab('register', this)">Registration</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="switchTab('scan', this)">Self-Access</button>
            </li>
        </ul>

        <!-- Registration View -->
        <div id="registerView">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Request Access Pass</h2>
                <p class="text-muted">Register your vehicle for official QR access</p>
            </div>

            <form id="registrationForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Full Name</label>
                        <input type="text" id="userName" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Plate Number</label>
                        <input type="text" id="userPlate" class="form-control" placeholder="ABC-1234" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Contact Number</label>
                        <input type="text" id="userPhone" class="form-control" placeholder="+63...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Facebook/Messenger</label>
                        <input type="text" id="userMessenger" class="form-control" placeholder="fb.com/username">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Facebook/Messenger</label>
                        <input type="text" id="userMessenger" class="form-control" placeholder="fb.com/username">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Vehicle Type</label>
                        <select id="userType" class="form-select">
                            <option value="Cars">Cars</option>
                            <option value="Motorcycle">Motorcycle</option>
                            <option value="Private">Private</option>
                            <option value="Deliveries">Deliveries</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Owner Photo</label>
                        <input type="file" id="photoFile" class="form-control" accept="image/*" required>
                        <div id="photoPrev" class="mt-2"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Helmet Info</label>
                        <input type="text" id="userHelmet" class="form-control" placeholder="Brand/Color">
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-bold">Helmet Photo (Optional)</label>
                        <input type="file" id="helmetFile" class="form-control" accept="image/*">
                        <div id="helmetPrev" class="mt-2"></div>
                    </div>
                </div>
                <button type="submit" class="btn-submit shadow">Submit Registration</button>
            </form>

            <div id="statusMsg" class="mt-3 text-center d-none">
                <div class="alert alert-success rounded-4">
                    <span class="material-icons-round align-middle me-1">check_circle</span>
                    <strong>Request Sent!</strong><br>Wait for admin approval in the main dashboard.
                </div>
                <button class="btn btn-link text-decoration-none" onclick="location.reload()">Register another</button>
            </div>
        </div>

        <!-- Scan Access View -->
        <div id="scanView" class="d-none">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Self-Access Terminal</h2>
                <p class="text-muted">Scan your QR code for Entry/Exit</p>
            </div>
            <div id="reader"></div>
            <div id="accessStatus" class="mt-4 text-center"></div>
        </div>
    </div>

    <script>
        let ownerBase64 = "";
        let helmetBase64 = "";
        let html5QrcodeScanner = null;

        window.addEventListener('load', () => {
            const savedBg = localStorage.getItem('customBg');
            if(savedBg){ 
                const bg = document.getElementById('bg-canvas'); 
                bg.style.backgroundImage = `url(${savedBg})`; 
                bg.style.backgroundSize = "cover"; 
            }
        });

        function switchTab(tab, btn) {
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (tab === 'register') {
                document.getElementById('registerView').classList.remove('d-none');
                document.getElementById('scanView').classList.add('d-none');
                if(html5QrcodeScanner) html5QrcodeScanner.clear();
                html5QrcodeScanner = null;
            } else {
                document.getElementById('registerView').classList.add('d-none');
                document.getElementById('scanView').classList.remove('d-none');
                startScanner();
            }
        }

        function startScanner() {
            if (html5QrcodeScanner) return;
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            html5QrcodeScanner.render(onScanSuccess);
        }

        function onScanSuccess(decodedText) {
            const registry = JSON.parse(localStorage.getItem('qrRegistry')) || [];
            const vehicles = JSON.parse(localStorage.getItem('vehicleLogs')) || [];
            let data = null;

            // "Always Authorized" Logic
            try {
                data = JSON.parse(decodedText);
                const reg = registry.find(r => r.id === data.id);
                if (reg) Object.assign(data, reg);
            } catch (e) {
                const plate = decodedText.trim().toUpperCase();
                const reg = registry.find(r => r.plate === plate);
                data = reg ? { ...reg } : { id: Date.now(), plate: plate || "GUEST", name: 'Guest', type: 'Private' };
            }

            if (!data.plate) data.plate = "TEMP-" + Date.now().toString().slice(-4);
            
            const statusDiv = document.getElementById('accessStatus');
            const now = new Date();
            const timeStr = now.toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });
            
            const activeLogIdx = vehicles.findIndex(v => v.plate === data.plate && v.logOutTime === "---");

            if (activeLogIdx !== -1) {
                vehicles[activeLogIdx].logOutTime = timeStr;
                statusDiv.innerHTML = `<div class="alert alert-info rounded-4"><strong>Goodbye, ${data.name}!</strong><br>Exit logged: ${timeStr}</div>`;
            } else {
                vehicles.push({
                    ...data,
                    logInTime: timeStr,
                    logOutTime: "---",
                    spot: "Self-Assigned",
                    timestamp: now.getTime()
                });
                statusDiv.innerHTML = `<div class="alert alert-success rounded-4"><strong>Welcome, ${data.name}!</strong><br>Entry logged: ${timeStr}</div>`;
            }

            localStorage.setItem('vehicleLogs', JSON.stringify(vehicles));
            setTimeout(() => { statusDiv.innerHTML = ''; }, 4000);
        }

        function processFile(file, callback, previewId) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 300;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max/w; w = max; } }
                    else { if (h > max) { w *= max/h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7);
                    callback(base64);
                    document.getElementById(previewId).innerHTML = `<img src="${base64}" class="preview-img">`;
                };
                img.src = reader.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('photoFile').addEventListener('change', (e) => processFile(e.target.files[0], (b) => ownerBase64 = b, 'photoPrev'));
        document.getElementById('helmetFile').addEventListener('change', (e) => processFile(e.target.files[0], (b) => helmetBase64 = b, 'helmetPrev'));

        document.getElementById('registrationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const pending = JSON.parse(localStorage.getItem('pendingRegistrations')) || [];
            pending.push({
                id: Date.now(),
                name: document.getElementById('userName').value,
                plate: document.getElementById('userPlate').value.toUpperCase(),
                phone: document.getElementById('userPhone').value,
                messenger: document.getElementById('userMessenger').value,
                helmet: document.getElementById('userHelmet').value,
                type: document.getElementById('userType').value,
                photo: ownerBase64,
                helmetPhoto: helmetBase64,
                status: 'Pending',
                submittedAt: new Date().toLocaleString()
            });
            localStorage.setItem('pendingRegistrations', JSON.stringify(pending));
            document.getElementById('registrationForm').classList.add('d-none');
            document.getElementById('statusMsg').classList.remove('d-none');
        });
    </script>
</body>
</html>
